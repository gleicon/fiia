[hub]
listen_addr = ":9443"
cert_path = "dev/ca/hub_cert.pem"
key_path = "dev/ca/hub_key.pem"
db_path = "/tmp/fiia-dev.db"
api_addr = ":9091"   # serves REST API + /metrics + /healthz
